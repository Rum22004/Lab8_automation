# Private Cloud Storage App — configuration

spring.application.name=private-cloud-storage

# In-memory H2 database (resets on restart)
spring.datasource.url=jdbc:h2:mem:cloud;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# H2 web console at http://localhost:8080/h2-console (jdbc url: jdbc:h2:mem:cloud)
spring.h2.console.enabled=true

# Allow file uploads up to the 50 MB quota (+ headroom for negative tests)
spring.servlet.multipart.max-file-size=64MB
spring.servlet.multipart.max-request-size=64MB

# Keep the session id in a cookie only (no ;jsessionid= in URLs)
server.servlet.session.tracking-modes=cookie

# Each new user is granted exactly 50 MB
app.storage.default-quota-bytes=52428800
