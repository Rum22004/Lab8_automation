name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Compile main and test code
        run: mvn -B clean test-compile

      - name: Install Playwright Chromium
        run: mvn -B exec:java -Dexec.classpathScope=test -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium"

      - name: Run tests
        run: mvn -B test
        env:
          CI: true

      - name: Generate Allure report
        if: always()
        run: mvn -B allure:report

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results
          path: target/allure-results
          if-no-files-found: warn

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          if-no-files-found: warn
          